services:
  - type: web
    name: medical-agent
    runtime: python
    buildCommand: pip install poetry && poetry install --no-dev
    startCommand: poetry run uvicorn src.api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_VERSION
        value: 3.12.0
