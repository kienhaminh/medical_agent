# Default configuration for AI Agent

# Provider Configuration
# Overridden by AI_PROVIDER env var (set in .env)
provider: kimi  # Options: openai, kimi, gemini

# Per-provider model configuration — single source of truth for models
# MODEL env var overrides the active provider's model at runtime
providers:
  openai:
    model: gpt-5.4-mini
  kimi:
    model: kimi-k2.5
    temperature: 1  # kimi-k2.5 only supports temperature=1
  gemini:
    model: gemini-2.5-pro
max_tokens: 4096
temperature: 0.3

# Redis Configuration
redis_url: redis://localhost:6379/0

# Context Configuration
context:
  max_messages: 50
  keep_recent: 20
  max_tokens: 100000

# Session Configuration
session:
  auto_save: true
  storage_path: sessions

# Logging Configuration
logging:
  level: DEBUG
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Tool Configuration
tools:
  enabled:
    - calculator
    - file_ops
    - datetime

# CORS Configuration
cors_origins:
  - "http://localhost:3000"

# Skill Configuration
skills:
  # If true, only load skills from database (ignore filesystem)
  # Set to true after running: python -m scripts.migrate_skills_to_db
  db_only: false
  
  # Directories to scan for skills (only used when db_only: false)
  core_dir: "src/skills"
  custom_dir: "./custom_skills"
  external_dir: "./external_skills"
