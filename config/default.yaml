# Default configuration for AI Agent

# Provider Configuration
provider: kimi  # Options: kimi, gemini

# Model Configuration
# For kimi: kimi-k2-thinking, kimi-k2-5, kimi-k1-5
# For gemini: gemini-2.5-pro, gemini-2.0-flash
model: kimi-k2-thinking
max_tokens: 4096
temperature: 0.3

# Redis Configuration
redis_url: redis://localhost:6379/0

# Context Configuration
context:
  max_messages: 50
  keep_recent: 20
  max_tokens: 100000

# Session Configuration
session:
  auto_save: true
  storage_path: sessions

# Logging Configuration
logging:
  level: DEBUG
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Tool Configuration
tools:
  enabled:
    - calculator
    - file_ops
    - datetime
