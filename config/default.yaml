# Default configuration for AI Agent

# Provider Configuration
# Each agent uses a dedicated provider — routing is fixed in dependencies.py:
#   intake  → OpenAI (OPENAI_MODEL env var, default: gpt-4.1)
#   doctor  → Kimi   (KIMI_MODEL env var,   default: kimi-k2.5)
provider: kimi  # legacy fallback, no longer drives agent routing

# Per-provider model configuration (used as reference / legacy fallback)
providers:
  openai:
    model: gpt-4.1
  kimi:
    model: kimi-k2.5
    temperature: 1  # kimi-k2.5 only supports temperature=1
  gemini:
    model: gemini-2.5-pro
max_tokens: 4096
temperature: 0.3

# Redis Configuration
redis_url: redis://localhost:6379/0

# Context Configuration
context:
  max_messages: 50
  keep_recent: 20
  max_tokens: 100000

# Session Configuration
session:
  auto_save: true
  storage_path: sessions

# Logging Configuration
logging:
  level: DEBUG
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Tool Configuration
tools:
  enabled:
    - calculator
    - file_ops
    - datetime

# CORS Configuration
cors_origins:
  - "http://localhost:3000"

# Skill Configuration
skills:
  # If true, only load skills from database (ignore filesystem)
  # Set to true after running: python -m scripts.migrate_skills_to_db
  db_only: false
  
  # Directories to scan for skills (only used when db_only: false)
  core_dir: "src/skills"
  custom_dir: "./custom_skills"
  external_dir: "./external_skills"
